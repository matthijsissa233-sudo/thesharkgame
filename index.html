<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Shark Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body,html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#0b132b; font-family:'Courier New',monospace; user-select: none; }
        canvas { display:block; width:100vw; height:100vh; background:linear-gradient(#1c2541,#0b132b); image-rendering:pixelated; }
        #ui { position:absolute; top:20px; left:50%; transform:translateX(-50%); color:#ffb703; font-size:28px; font-weight:bold; text-shadow:3px 3px 0px #000; pointer-events:none; text-align:center; z-index:5; }
        #timer-display { font-size: 22px; color: #e63946; margin-top: 5px; font-variant-numeric: tabular-nums; }
        
        /* Highscore Bord Stijl */
        #leaderboard { position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.85); border:3px solid #48cae4; padding:15px; color:#fff; z-index:20; box-shadow:4px 4px 0px #000; width:220px; pointer-events:none; }
        #leaderboard h3 { margin:0 0 10px 0; color:#ffb703; font-size:16px; text-align:center; border-bottom:2px solid #48cae4; padding-bottom:5px; }
        .score-row { display:flex; justify-content:space-between; font-size:14px; margin-bottom:4px; }

        /* Mobiele Besturing Stijl */
        #mobile-controls { position: absolute; bottom: 30px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 25; pointer-events: auto; }
        .m-btn { width: 70px; height: 70px; background: rgba(72, 202, 228, 0.4); border: 3px solid #48cae4; border-radius: 15px; color: #fff; font-size: 30px; font-weight: bold; display: flex; justify-content: center; align-items: center; box-shadow: 4px 4px 0px #000; cursor: pointer; }
        .m-btn:active { background: rgba(72, 202, 228, 0.8); }
        #mobile-left-group { display: flex; gap: 15px; }

        .sc { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(11,19,43,0.95); flex-direction:column; justify-content:center; align-items:center; color:#fff; z-index:10; text-align:center; }
        #w { border:8px solid #ffb703; } #d { border:8px solid #e63946; }
        .sc h1 { font-size:45px; text-shadow:4px 4px 0px #000; margin-bottom:15px; padding: 0 20px; }
        #w h1 { color:#ffb703; } #d h1 { color:#e63946; }
        .sc p { color:#48cae4; font-size:24px; text-shadow:2px 2px 0px #000; margin-bottom:25px; }
        .btn { background:#e63946; color:#fff; border:4px solid #b71c1c; padding:15px 35px; font-size:22px; font-weight:bold; cursor:pointer; box-shadow:4px 4px 0px #000; margin: 10px; }
        .btn:hover { background:#ff4d6d; }
        #btn-next { background:#ffb703; border-color:#fb8500; color:#000; }
        #chatbox { position:absolute; bottom:40px; left:20px; background:rgba(0,0,0,0.8); border:2px solid #48cae4; padding:10px; display:none; z-index:20; box-shadow:4px 4px 0px #000; }
        #chatbox input { background:transparent; border:none; color:#fff; font-size:18px; font-family:'Courier New',monospace; width:250px; outline:none; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="game-title">MATTHIJS ISSA (LEVEL 1)</div>
        <div id="timer-display">TIJD: 20.00</div>
    </div>

    <!-- Wereldwijd Scorebord UI -->
    <div id="leaderboard">
        <h3 id="board-title">🌍 TOP 5 LEVEL 1</h3>
        <div id="scores-list">Laden...</div>
    </div>

    <!-- Mobiele Knoppen -->
    <div id="mobile-controls">
        <div id="mobile-left-group">
            <div class="m-btn" id="m-left">◀</div>
            <div class="m-btn" id="m-right">▶</div>
        </div>
        <div class="m-btn" id="m-jump">▲</div>
    </div>

    <div id="w" class="sc">
        <h1>GEFELICITEERD JE HEBT GEWONNEN</h1>
        <p id="win-text">credits matthijs issa</p>
        <button class="btn" id="btn-next" onclick="startLevel2()">Level 2</button>
        <button class="btn" onclick="respawn()">Opnieuw Spelen</button>
    </div>
    
    <div id="d" class="sc"><h1 id="death-text">JE BENT DOOD GEGAAN</h1><button class="btn" onclick="respawn()">Respawn</button></div>
    <div id="chatbox"><input type="password" id="chat-input" placeholder="Type cheat..."></div>

    <canvas id="g"></canvas>
    <script>
        const canvas = document.getElementById('g'), ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById('mobile-controls').style.display = 'flex';
        }

        let spelerNaam = prompt("Voer je naam in voor de wereldwijde highscore:", "Gast");
        if(!spelerNaam || spelerNaam.trim() === "") spelerNaam = "Anoniem";
        spelerNaam = spelerNaam.substring(0, 12);

        const player = { x:50, y:canvas.height-200, w:56, h:28, vx:0, vy:0, speed:4, jump:12, ground:false };
        const gravity = 0.5, keys = {};
        let camX = 0, win = false, isDead = false, tick = 0, gY = canvas.height-100;
        
        let chatOpen = false;
        let ownerMode = false; 

        let timerGestart = false; 
        let huidigLevel = 1;
        let timeLeft = 20000; 
        let lastTime = performance.now();

        const lv1 = [
            [0,gY,180,0], [260,gY-50,100,0], [420,gY-110,90,0],
            [580,gY-70,100,1,580,140,1,2.5], [850,gY-130,80,0], [1010,gY-190,60,0],
            [1140,gY-110,90,1,1140,150,-1,3], [1420,gY-160,80,0], [1580,gY-220,70,0],
            [1720,gY-140,100,2,1720,40], [1910,gY-80,110,0], [2100,gY-140,70,0],
            [2250,gY-210,80,1,2250,120,1,3], [2480,gY-130,60,2,2480,30], [2620,gY-70,90,0],
            [2780,gY-130,60,0], [2910,gY-200,60,0], [3050,gY-110,100,1,3050,180,-1,3.5],
            [3350,gY-160,70,0], [3500,gY-100,60,2,3500,30], [3640,gY-150,250,3]
        ];

        const lv2 = [
            [0,gY,180,0], [240,gY-40,90,0], [380,gY-90,80,0], 
            [500,gY-140,80,1,500,110,1,3.5], [740,gY-80,90,0], [880,gY-140,70,2,880,25],
            [1020,gY-200,60,0], [1140,gY-120,80,1,1140,130,-1,4], [1360,gY-180,70,0],
            [1500,gY-100,90,2,1500,30], [1650,gY-160,80,0], [1790,gY-220,60,0],
            [1920,gY-140,90,1,1920,140,1,4.2], [2180,gY-80,80,0], [2310,gY-140,70,2,2310,25],
            [2440,gY-200,60,0], [2560,gY-120,80,1,2560,120,-1,3.5], [2780,gY-170,80,0],
            [2920,gY-230,70,0], [3050,gY-150,85,2,3050,30], [3200,gY-90,90,0],
            [3350,gY-150,70,0], [3480,gY-210,60,1,3480,130,1,4.5], [3720,gY-130,80,2,3720,25],
            [3860,gY-70,90,0], [4010,gY-130,60,0], [4140,gY-190,75,0], [4270,gY-110,80,1,4270,120,-1,4],
            [4500,gY-160,70,0], [4640,gY-220,60,2,4640,30], [4770,gY-140,90,0], [4910,gY-80,80,0],
            [5050,gY-140,70,1,5050,140,1,4.5], [5320,gY-200,60,0], [5450,gY-120,85,2,5450,25],
            [5590,gY-170,80,0], [5720,gY-230,65,0], [5850,gY-150,90,1,5850,110,-1,5],
            [6100,gY-100,75,0], [6230,gY-160,250,3]
        ];

        let platforms = [];
        laadLevelPlatforms(lv1);

        function laadLevelPlatforms(levelData) {
            platforms = levelData.map(p => ({ 
                x: p[0], y: p[1], w: p[2], h: 24, t: p[3], 
                sx: p[4] || 0, rg: p[5] || 0, dir: p[6] || 0, sp: p[7] || 30, 
                tm: 0, st: false, sy: p[1] 
            }));
            platforms[0].h = 200; 
            platforms[platforms.length - 1].h = 400;
        }
        function startTimer() {
            timeLeft = huidigLevel === 1 ? 20000 : 30000; 
            timerGestart = false; 
            document.getElementById('timer-display').innerText = huidigLevel === 1 ? "TIJD: 20.00" : "TIJD: 30.00";
            document.getElementById('timer-display').style.color = "#48cae4"; 
            laadHighscores();
        }

        function triggerMobileStart() {
            if (!timerGestart) {
                timerGestart = true;
                lastTime = performance.now();
                document.getElementById('timer-display').style.color = "#e63946";
            }
        }

        window.addEventListener('keydown', e => { 
            if (chatOpen) {
                if (e.key === 'Enter') verwerkCommando();
                if (e.key === 'Escape') sluitChat();
                return; 
            }
            if(!isDead && !win) {
                keys[e.code] = true;
                if (!timerGestart && ['KeyA', 'KeyD', 'KeyW', 'Space', 'ArrowLeft', 'ArrowRight', 'ArrowUp'].includes(e.code)) {
                    timerGestart = true;
                    lastTime = performance.now();
                    document.getElementById('timer-display').style.color = "#e63946"; 
                }
            }
            if (e.key === '/') { e.preventDefault(); openChat(); }
        });

        window.addEventListener('keyup', e => { keys[e.code] = false; });

        document.getElementById('m-left').addEventListener('touchstart', e => { e.preventDefault(); keys['KeyA'] = true; triggerMobileStart(); });
        document.getElementById('m-left').addEventListener('touchend', e => { e.preventDefault(); keys['KeyA'] = false; });
        document.getElementById('m-right').addEventListener('touchstart', e => { e.preventDefault(); keys['KeyD'] = true; triggerMobileStart(); });
        document.getElementById('m-right').addEventListener('touchend', e => { e.preventDefault(); keys['KeyD'] = false; });
        document.getElementById('m-jump').addEventListener('touchstart', e => { e.preventDefault(); keys['Space'] = true; triggerMobileStart(); });
        document.getElementById('m-jump').addEventListener('touchend', e => { e.preventDefault(); keys['Space'] = false; });

        function openChat() {
            chatOpen = true;
            for (let k in keys) keys[k] = false; 
            const box = document.getElementById('chatbox');
            const input = document.getElementById('chat-input');
            box.style.display = 'block';
            input.value = ''; 
            input.focus();
        }

        function sluitChat() {
            chatOpen = false;
            document.getElementById('chatbox').style.display = 'none';
            canvas.focus();
        }

        function verwerkCommando() {
            const input = document.getElementById('chat-input');
            const tekst = input.value.trim().toLowerCase();
            if (tekst === 'owner') {
                ownerMode = true; 
                document.getElementById('timer-display').style.display = 'none';
            } 
            else if (tekst === 'unowner') {
                ownerMode = false;
                lastTime = performance.now();
                document.getElementById('timer-display').style.display = 'block';
            }
            else if (tekst === 'resetboard') {
                const storageKey = `shark_scores_lvl_${huidigLevel}`;
                localStorage.removeItem(storageKey);
                laadHighscores();
            }
            sluitChat();
        }

        function startLevel2() {
            huidigLevel = 2;
            win = false;
            document.getElementById('w').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('game-title').innerText = "MATTHIJS ISSA (LEVEL 2)";
            document.getElementById('board-title').innerText = "🌍 TOP 5 LEVEL 2";
            player.x = 50; player.y = canvas.height - 200; player.vx = player.vy = 0;
            laadLevelPlatforms(lv2);
            startTimer();
        }

        function respawn() {
            isDead = false; win = false;
            document.getElementById('d').style.display = 'none'; 
            document.getElementById('w').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            ownerMode = false;
            document.getElementById('timer-display').style.display = 'block';
            player.x = 50; player.y = canvas.height - 200; player.vx = player.vy = 0;
            if (huidigLevel === 1) laadLevelPlatforms(lv1);
            else laadLevelPlatforms(lv2);
            startTimer();
        }
        function updateTimer() {
            if (win || isDead || ownerMode || !timerGestart) {
                if (!timerGestart) lastTime = performance.now();
                return;
            }
            const now = performance.now();
            const delta = now - lastTime;
            lastTime = now;
            timeLeft -= delta;
            if (timeLeft <= 0) {
                timeLeft = 0;
                triggerDeath("SKILL ISSUE");
            }
            const sec = Math.floor(timeLeft / 1000);
            const ms = Math.floor((timeLeft % 1000) / 10);
            document.getElementById('timer-display').innerText = `TIJD: ${sec}.${ms < 10 ? '0' : ''}${ms}`;
        }

        function triggerDeath(bericht) {
            isDead = true;
            timerGestart = false;
            for(let k in keys) keys[k]=false;
            document.getElementById('ui').style.display = 'none';
            document.getElementById('death-text').innerText = bericht;
            document.getElementById('d').style.display = 'flex';
        }

        function laadHighscores() {
            const storageKey = `shark_scores_lvl_${huidigLevel}`;
            let scores = JSON.parse(localStorage.getItem(storageKey) || '[]');
            updateHighscoreBordUI(scores);
        }

        function slaScoreOp(naam, overgeblevenTijd) {
            const limiet = huidigLevel === 1 ? 20000 : 30000;
            const gezetteTijd = (limiet - overgeblevenTijd) / 1000;
            const storageKey = `shark_scores_lvl_${huidigLevel}`;
            let scores = JSON.parse(localStorage.getItem(storageKey) || '[]');
            scores.push({ naam: naam, tijd: gezetteTijd });
            scores.sort((a, b) => a.tijd - b.tijd);
            scores = scores.slice(0, 5);
            localStorage.setItem(storageKey, JSON.stringify(scores));
            updateHighscoreBordUI(scores);
        }

        function updateHighscoreBordUI(scores) {
            const lijst = document.getElementById('scores-list');
            if (!scores || scores.length === 0) {
                lijst.innerHTML = '<div style="text-align:center;color:#888;">Nog geen scores!</div>';
                return;
            }
            let html = '';
            scores.forEach((s, index) => {
                html += `<div class="score-row"><span>${index + 1}. ${s.naam}</span><span>${s.tijd.toFixed(2)}s</span></div>`;
            });
            lijst.innerHTML = html;
        }

        function drawFlag(fx, fy) {
            ctx.save(); ctx.translate(fx, fy - 100);
            ctx.fillStyle = '#000000'; ctx.fillRect(4, 0, 10, 10);
            ctx.fillStyle = '#ffcc00'; ctx.fillRect(6, 2, 6, 6);
            ctx.fillStyle = '#ffff66'; ctx.fillRect(6, 2, 2, 2);
            ctx.fillStyle = '#000000'; ctx.fillRect(6, 10, 6, 90);
            ctx.fillStyle = '#ffdb4d'; ctx.fillRect(8, 10, 2, 90);
            ctx.fillStyle = '#000000'; ctx.fillRect(2, 94, 14, 16);
            ctx.fillStyle = '#ffcc00'; ctx.fillRect(4, 96, 10, 12);
            ctx.fillStyle = '#ffff66'; ctx.fillRect(4, 96, 4, 4);
            ctx.fillStyle = '#000000'; ctx.fillRect(12, 10, 44, 46);
            ctx.fillStyle = huidigLevel === 1 ? '#3399ff' : '#e63946'; ctx.fillRect(12, 12, 42, 42); 
            ctx.fillStyle = huidigLevel === 1 ? '#0066cc' : '#b71c1c'; ctx.fillRect(44, 12, 10, 42);
            ctx.clearRect(52, 10, 4, 6); ctx.clearRect(50, 16, 6, 6); ctx.clearRect(52, 22, 4, 8);
            ctx.clearRect(50, 30, 6, 6); ctx.clearRect(52, 36, 4, 8); ctx.clearRect(50, 44, 6, 6); ctx.clearRect(52, 50, 4, 6);
            ctx.fillStyle = '#ffffff'; ctx.fillRect(22, 18, 18, 28); ctx.fillRect(20, 22, 22, 20);
            ctx.fillStyle = huidigLevel === 1 ? '#e63946' : '#3399ff'; ctx.fillRect(24, 24, 2, 14); ctx.fillRect(36, 24, 2, 14);
            ctx.fillRect(26, 26, 2, 4); ctx.fillRect(28, 28, 2, 4); ctx.fillRect(30, 30, 2, 4);
            ctx.fillRect(32, 28, 2, 4); ctx.fillRect(34, 26, 2, 4);
            ctx.restore();
        }

        function loop() {
            tick += 0.15; updateTimer();
            if (!win && !isDead) {
                player.vx = keys['KeyD']||keys['ArrowRight'] ? player.speed : (keys['KeyA']||keys['ArrowLeft'] ? -player.speed : 0);
                if (ownerMode) {
                    player.vy = keys['KeyW']||keys['ArrowUp'] ? -player.speed : (keys['KeyS']||keys['ArrowDown'] ? player.speed : 0);
                } else {
                    if ((keys['Space']||keys['KeyW']||keys['ArrowUp']) && player.ground) { player.vy = -player.jump; player.ground = false; }
                    player.vy += gravity;
                }
                player.x += player.vx; player.y += player.vy; player.ground = false;
                if (player.x < 0) player.x = 0;

                platforms.forEach(p => {
                    if (p.t === 1) { p.x += p.sp * p.dir; if (p.x > p.sx + p.rg || p.x < p.sx) p.dir *= -1; }
                    if (p.t === 2 && p.st) { p.tm++; if (p.tm > p.sp) p.y += 8; }
                    if (player.x < p.x + p.w && player.x + player.w > p.x && player.y < p.y + p.h && player.y + player.h > p.y) {
                        if (!ownerMode && player.vy > 0 && player.y + player.h - player.vy <= p.y + 8) {
                            player.y = p.y - player.h; player.vy = 0; player.ground = true;
                            if (p.t === 1) player.x += p.sp * p.dir; if (p.t === 2) p.st = true;
                            if (p.t === 3) { 
                                win = true; timerGestart = false;
                                slaScoreOp(spelerNaam, timeLeft); 
                                if (huidigLevel === 2) document.getElementById('btn-next').style.display = 'none';
                                else document.getElementById('btn-next').style.display = 'inline-block';
                                document.getElementById('ui').style.display = 'none'; document.getElementById('w').style.display = 'flex'; 
                            }
                        }
                    }
                });
                if (player.y > canvas.height && !ownerMode) triggerDeath("HOE KAN JE MOGELIJK VALLEN IN DE LAVA SKILL ISSUE");
            }

            camX = Math.max(0, player.x - canvas.width / 4);
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save(); ctx.translate(-camX, 0);
            ctx.fillStyle = '#ff3333'; ctx.fillRect(camX, canvas.height - 16, canvas.width, 16);
            ctx.fillStyle = '#cc0000'; ctx.fillRect(camX, canvas.height - 8, canvas.width, 8);

            platforms.forEach(p => {
                let c1 = '#4a5568', c2 = '#2d3748';
                if (p.t === 3) { c1 = '#ffb703'; c2 = '#fb8500'; } if (p.t === 1) { c1 = '#00b4d8'; c2 = '#0077b6'; } if (p.t === 2) { c1 = '#e63946'; c2 = '#d90429'; }
                ctx.fillStyle = p.t === 2 && p.st ? '#f1faee' : c1; ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = c2; ctx.fillRect(p.x, p.y + p.h - 6, p.w, 6);
                ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(p.x, p.y, p.w, 4);
                if (p.t === 3) drawFlag(p.x + p.w / 2 - 20, p.y);
            });

            ctx.save(); ctx.translate(player.x, player.y); if (player.vx < 0) { ctx.translate(player.w, 0); ctx.scale(-1, 1); }
            const pz = 2; function drawP(x,y,w,h,c) { ctx.fillStyle=c; ctx.fillRect(x*pz,y*pz,w*pz,h*pz); }
            drawP(2,2,24,10,'#0096c7'); drawP(4,1,20,1,'#0077b6'); drawP(2,0,22,2,'#03045e'); drawP(24,2,2,3,'#03045e'); drawP(4,12,18,2,'#edf2f7'); drawP(22,9,4,3,'#edf2f7');
            drawP(10,5,1,4,'#023e8a'); drawP(12,5,1,4,'#023e8a'); drawP(14,5,1,4,'#023e8a'); drawP(10,-4,4,4,'#03045e'); drawP(8,-2,2,2,'#03045e'); drawP(12,-2,4,2,'#0077b6');
            
            let tO = Math.round(Math.sin(tick)*1.5); 
            drawP(-3,2+tO,3,8,'#03045e'); drawP(0,4+tO,2,5,'#0096c7'); drawP(-5,0+tO,2,3,'#03045e'); drawP(-5,9+tO,2,3,'#03045e');
            drawP(20,2,5,3,'#f72585'); drawP(23,3,1,1,'#fff'); drawP(16,2,4,1,'#2b2d42'); drawP(21,9,1,1,'#fff'); drawP(23,9,1,1,'#fff');
            
            ctx.restore(); ctx.restore();
        }
        function run() { loop(); requestAnimationFrame(run); } 
        startTimer(); run();
    </script>
</body>
</html>
